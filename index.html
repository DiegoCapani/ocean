<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Open World Survival</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #111;
            font-family: monospace;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 5px;
            pointer-events: none;
            user-select: none;
        }
        .bar {
            width: 150px;
            height: 15px;
            background: #444;
            margin-bottom: 5px;
            border-radius: 3px;
            overflow: hidden;
        }
        #hp-bar { width: 100%; height: 100%; background: #ff4d4d; }
    </style>
</head>
<body>

    <div id="ui">
        <h2>STAZIONE DI SOPRAVVIVENZA</h2>
        <p>Coordinate: X: <span id="ui-x">0</span> | Y: <span id="ui-y">0</span></p>
        <div>Salute:</div>
        <div class="bar"><div id="hp-bar"></div></div>
        <p>Zombie Eliminati: <span id="ui-score">0</span></p>
        <p><small>WASD / Frecce per muoverti<br>Sposta il mouse per mirare<br>Click sinistro per sparare</small></p>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- CONFIGURAZIONE GIOCO ---
const TILE_SIZE = 64; 
const WORLD_SEED = Math.random() * 10000;

// Il giocatore parte esattamente al centro matematico del primo tile
const player = {
    x: 0, 
    y: 0,
    speed: 4,
    hp: 100,
    maxHp: 100,
    score: 0,
    angle: 0
};

const keys = {};
const mouse = { x: 0, y: 0, clicked: false };

window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});
window.addEventListener('mousedown', () => mouse.clicked = true);
window.addEventListener('mouseup', () => mouse.clicked = false);

let zombies = [];
let bullets = [];

// --- GENERAZIONE PROCEDURALE DEL TERRENO ---
function pseudoRandom2D(x, y) {
    let n = Math.sin(x * 12.9898 + y * 78.233 + WORLD_SEED) * 43758.5453123;
    return n - Math.floor(n);
}

function smoothNoise(x, y) {
    let corners = (pseudoRandom2D(x-1, y-1) + pseudoRandom2D(x+1, y-1) + pseudoRandom2D(x-1, y+1) + pseudoRandom2D(x+1, y+1)) / 16;
    let sides   = (pseudoRandom2D(x-1, y) + pseudoRandom2D(x+1, y) + pseudoRandom2D(x, y-1) + pseudoRandom2D(x, y+1)) / 8;
    let center  = pseudoRandom2D(x, y) / 4;
    return corners + sides + center;
}

function interpolatedNoise(x, y) {
    let intX = Math.floor(x);
    let fracX = x - intX;
    let intY = Math.floor(y);
    let fracY = y - intY;

    let v1 = smoothNoise(intX, intY);
    let v2 = smoothNoise(intX + 1, intY);
    let v3 = smoothNoise(intX, intY + 1);
    let v4 = smoothNoise(intX + 1, intY + 1);

    let fX = (1 - Math.cos(fracX * Math.PI)) * 0.5;
    let fY = (1 - Math.cos(fracY * Math.PI)) * 0.5;

    let i1 = v1 * (1 - fX) + v2 * fX;
    let i2 = v3 * (1 - fX) + v4 * fX;

    return i1 * (1 - fY) + i2 * fY;
}

function getTerrainType(tileX, tileY) {
    // GARANZIA DI SPAWN: Se siamo al centro del mondo (tile 0,0), restituisce sempre erba calpestabile
    if (tileX === 0 && tileY === 0) {
        return { type: "grass", color: "#2a9d8f", walkable: true };
    }

    let value = interpolatedNoise(tileX * 0.05, tileY * 0.05) * 0.7 + 
                interpolatedNoise(tileX * 0.2, tileY * 0.2) * 0.3;

    if (value < 0.30) return { type: "water", color: "#1d3557", walkable: false };
    if (value < 0.40) return { type: "sand", color: "#f1faee", walkable: true };
    if (value < 0.70) return { type: "grass", color: "#2a9d8f", walkable: true };
    return { type: "forest", color: "#1b4332", walkable: true };
}

// --- ENGINE LOGICO ---
let spawnTimer = 0;
let lastShot = 0;

function update() {
    let moveX = 0;
    let moveY = 0;
    
    if (keys['w'] || keys['arrowup']) moveY = -1;
    if (keys['s'] || keys['arrowdown']) moveY = 1;
    if (keys['a'] || keys['arrowleft']) moveX = -1;
    if (keys['d'] || keys['arrowright']) moveX = 1;

    if (moveX !== 0 && moveY !== 0) {
        moveX *= 0.7071;
        moveY *= 0.7071;
    }

    let nextX = player.x + moveX * player.speed;
    let nextY = player.y + moveY * player.speed;

    // Calcolo preciso del tile in base alle coordinate assolute del mondo
    let tileX = Math.floor(nextX / TILE_SIZE);
    let tileY = Math.floor(nextY / TILE_SIZE);
    let terrain = getTerrainType(tileX, tileY);

    // Se il terreno è calpestabile, aggiorna la posizione
    if (terrain.walkable) {
        player.x = nextX;
        player.y = nextY;
    }

    // Rotazione verso il mirino del mouse
    let screenPlayerX = canvas.width / 2;
    let screenPlayerY = canvas.height / 2;
    player.angle = Math.atan2(mouse.y - screenPlayerY, mouse.x - screenPlayerX);

    // Gestione sistema di fuoco
    if (mouse.clicked && Date.now() - lastShot > 200) {
        bullets.push({
            x: player.x,
            y: player.y,
            vx: Math.cos(player.angle) * 12,
            vy: Math.sin(player.angle) * 12,
            life: 80 
        });
        lastShot = Date.now();
    }

    bullets = bullets.filter(b => {
        b.x += b.vx;
        b.y += b.vy;
        b.life--;
        return b.life > 0;
    });

    // Spawn dinamico degli Zombie all'esterno della visuale
    spawnTimer++;
    if (spawnTimer > 60 && zombies.length < 40) {
        let spawnAngle = Math.random() * Math.PI * 2;
        let radius = Math.max(canvas.width, canvas.height) / 1.5;
        zombies.push({
            x: player.x + Math.cos(spawnAngle) * radius,
            y: player.y + Math.sin(spawnAngle) * radius,
            speed: 1.2 + Math.random() * 1.5,
            hp: 2
        });
        spawnTimer = 0;
    }

    // AI Inseguimento e collisioni
    zombies.forEach((zombie) => {
        let dx = player.x - zombie.x;
        let dy = player.y - zombie.y;
        let dist = Math.sqrt(dx*dx + dy*dy);

        if (dist > 0) {
            zombie.x += (dx / dist) * zombie.speed;
            zombie.y += (dy / dist) * zombie.speed;
        }

        if (dist < 22) {
            player.hp -= 0.4; 
        }

        bullets.forEach((bullet) => {
            let bDx = bullet.x - zombie.x;
            let bDy = bullet.y - zombie.y;
            let bDist = Math.sqrt(bDx*bDx + bDy*bDy);
            if (bDist < 20) {
                zombie.hp--;
                bullet.life = 0; 
                if (zombie.hp <= 0) player.score++;
            }
        });
    });

    zombies = zombies.filter(z => z.hp > 0);

    if (player.hp < player.maxHp) player.hp += 0.02;

    // Aggiornamento real-time interfaccia grafica
    document.getElementById("ui-x").innerText = Math.floor(player.x / TILE_SIZE);
    document.getElementById("ui-y").innerText = Math.floor(player.y / TILE_SIZE);
    document.getElementById("ui-score").innerText = player.score;
    document.getElementById("hp-bar").style.width = `${Math.max(0, player.hp)}%`;
}

// --- RENDERIZZAZIONE GRAFICA ---
function draw() {
    ctx.fillStyle = "#111";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Gestione della telecamera (Inquadratura sul giocatore)
    let camX = player.x - canvas.width / 2;
    let camY = player.y - canvas.height / 2;

    let startTileX = Math.floor(camX / TILE_SIZE);
    let endTileX = Math.ceil((camX + canvas.width) / TILE_SIZE);
    let startTileY = Math.floor(camY / TILE_SIZE);
    let endTileY = Math.ceil((camY + canvas.height) / TILE_SIZE);

    // Rendering della mappa visibile
    for (let x = startTileX; x <= endTileX; x++) {
        for (let y = startTileY; y <= endTileY; y++) {
            let terrain = getTerrainType(x, y);
            ctx.fillStyle = terrain.color;
            let screenX = x * TILE_SIZE - camX;
            let screenY = y * TILE_SIZE - camY;
            ctx.fillRect(screenX, screenY, TILE_SIZE + 0.5, TILE_SIZE + 0.5);
        }
    }

    // Rendering dei proiettili
    ctx.fillStyle = "#ffeb3b";
    bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x - camX, b.y - camY, 4, 0, Math.PI * 2);
        ctx.fill();
    });

    // Rendering degli Zombie
    zombies.forEach(zombie => {
        ctx.fillStyle = "#556b2f";
        ctx.strokeStyle = "#2f4f4f";
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(zombie.x - camX, zombie.y - camY, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
    });

    // Rendering del Giocatore
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(player.angle);
    
    ctx.fillStyle = "#e63946";
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, 18, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Arma
    ctx.fillStyle = "#1d3557";
    ctx.fillRect(12, -4, 16, 8);

    ctx.restore();

    // Schermata di Game Over
    if (player.hp <= 0) {
        ctx.fillStyle = "rgba(0,0,0,0.85)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#e63946";
        ctx.font = "bold 40px monospace";
        ctx.textAlign = "center";
        ctx.fillText("SEI STATO INFETTATO", canvas.width / 2, canvas.height / 2 - 20);
        ctx.font = "20px monospace";
        ctx.fillStyle = "#fff";
        ctx.fillText(`Hai abbattuto ${player.score} infetti prima di cadere.`, canvas.width / 2, canvas.height / 2 + 30);
        ctx.font = "14px monospace";
        ctx.fillStyle = "#888";
        ctx.fillText("Ricarica la pagina per ricominciare", canvas.width / 2, canvas.height / 2 + 70);
        return;
    }
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Inizializzazione dell'avvio
loop();
</script>
</body>
</html>
